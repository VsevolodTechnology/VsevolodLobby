# Suppress verbose SLF4J output — only show WARN+ from third-party libraries.
# Our own server events are routed through ServerLogger (with timestamps).
org.slf4j.simpleLogger.defaultLogLevel=warn

# Completely silence MongoDB driver (connection errors, client info, cluster state)
org.slf4j.simpleLogger.log.org.mongodb=error

# Silence Minestom internal INFO (startup messages, block-manager warnings)
org.slf4j.simpleLogger.log.net.minestom=error
# But allow console command responses (ConsoleSender.sendMessage routes through this logger)
org.slf4j.simpleLogger.log.net.minestom.server.command.ConsoleSender=info

# Silence Spark profiler startup/init messages
org.slf4j.simpleLogger.log.me.lucko.spark=error
# But allow spark command output (spark tps, spark profiler etc.)
org.slf4j.simpleLogger.log.me.lucko.spark.common.command=info

# Timestamp format — overridden at runtime by Main.configureSlfj() using the timezone from logging.yml.
# These values act as a fallback if the server starts without Main (e.g. unit tests).
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss 'UTC'
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.levelInBrackets=true
